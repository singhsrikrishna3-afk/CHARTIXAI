services:
  - type: web
    name: chartixai-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_SECRET
        value: chartixai_super_secret_jwt_key_2026
      - key: CORS_ORIGINS
        value: https://chartixai.com,https://www.chartixai.com,http://localhost:3000
      - key: DEBUG
        value: "false"
